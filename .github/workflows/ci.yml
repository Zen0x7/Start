name: CI

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    backend:
        runs-on: ubuntu-latest
        name: PHPUnit

        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.4'
                  extensions: mbstring, openssl, pdo, sqlite, gd
                  tools: composer:v2
                  coverage: pcov

            - name: Cache composer
              uses: actions/cache@v4
              with:
                  path: ~/.cache/composer
                  key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
                  restore-keys: ${{ runner.os }}-composer-

            - name: Install dependencies
              run: composer install --no-progress --prefer-dist --no-interaction

            - name: Prepare
              run: |
                  cp .env.example .env
                  php artisan key:generate --no-interaction
                  touch database/database.sqlite
                  php artisan migrate --no-interaction

            - name: PHPUnit with coverage
              run: php artisan test --compact --coverage
              env:
                  DB_CONNECTION: sqlite
                  DB_DATABASE: ${{ github.workspace }}/database/database.sqlite
                  JWT_SIGNING_KEY: 6YRSnwQ7VAzkOlVnxLr4hatPIoK6w8j+uqiw16KbU4M=

    frontend:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node: ['20', '22']

        name: Node ${{ matrix.node }}

        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js ${{ matrix.node }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}

            - name: Cache yarn
              uses: actions/cache@v4
              with:
                  path: ~/.cache/yarn
                  key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
                  restore-keys: ${{ runner.os }}-yarn-

            - name: Install dependencies
              run: yarn install --frozen-lockfile

            - name: TypeScript check
              run: yarn typecheck

            - name: Unit tests with coverage
              run: yarn test:unit:coverage

    dusk:
        runs-on: ubuntu-latest
        name: Dusk

        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.4'
                  extensions: mbstring, openssl, pdo, sqlite, gd
                  tools: composer:v2

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '22'

            - name: Install PHP deps
              run: composer install --no-progress --prefer-dist --no-interaction

            - name: Install JS deps
              run: yarn install --frozen-lockfile

            - name: Build frontend
              run: yarn build

            - name: Prepare environment
              run: |
                  cp .env.example .env
                  php artisan key:generate --no-interaction
                  touch ${{ github.workspace }}/database/database.sqlite
                  php artisan migrate --no-interaction

            - name: Setup Chrome
              run: php artisan dusk:chrome-driver 149

            - name: Start server
              run: php artisan serve --port=8000 --no-reload &
              env:
                  APP_URL: http://127.0.0.1:8000

            - name: Run Dusk
              run: php artisan dusk --no-interaction
              env:
                  APP_URL: http://127.0.0.1:8000
                  DB_CONNECTION: sqlite
                  DB_DATABASE: ${{ github.workspace }}/database/database.sqlite
                  JWT_SIGNING_KEY: 6YRSnwQ7VAzkOlVnxLr4hatPIoK6w8j+uqiw16KbU4M=

            - name: Upload screenshots
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: screenshots
                  path: tests/Browser/screenshots/*.webp
